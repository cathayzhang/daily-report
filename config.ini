[column_mapping]
# 定义源数据文件中的列名与程序内部标准名称的映射关系
# 格式为：内部标准名 = 源文件列名
key = issue_key
summary = summary
status = status
priority = priority
module = module
created_date = created
assignee = assignee

[settings]
# 定义历史数据文件的路径
history_path = data/history.csv
# JIRA 问题基础链接
jira_base_url = https://your-jira-instance.com/browse/
# 定义图表输出目录
charts_dir = output/charts/

[git]
# 本地 Git 仓库的路径
repo_path = .
# 默认查询的分支
branch = main

[report]
# Jinja2 报告模板的路径
template_path = templates/report_template.html
# 生成报告的输出目录
output_dir = output/reports/
# 项目名称，用于报告标题
project_name = 总控平台

[analysis]
# 定义分析时使用的参数
# 问题超期阈值（天）
overdue_threshold_days = 14
# 需要特别关注的标签，用逗号分隔
target_tags = on-fire,critical-bug

[kpi_settings]
# 定义高级KPI计算所需参数
# 计算7日趋势时，要关注的A类问题（优先级）的名称
# 这个值需要和你的JIRA数据中的优先级名称完全对应
a_priority_name = Blocker
# 定义风险模块分析时，需要统计的问题优先级列表，用逗号分隔
risk_module_priorities = Blocker,Critical

# 定义A、B、C类问题对应的优先级
class_a_priorities = Blocker
class_b_priorities = Critical,High
class_c_priorities = Medium,Low

[BurndownPlan]
; 项目或冲刺的开始日期 (格式: YYYY-MM-DD)
start_date = 2025-06-15
; 项目或冲刺的结束日期 (格式: YYYY-MM-DD)
end_date = 2025-06-25
; 起始日的A、B、C类问题存量
start_a = 50
start_b = 80
start_c = 120
; 目标日的A、B、C类问题存量
target_a = 5
target_b = 20
target_c = 40
; DI 计算公式中 A, B, C 等级的权重
di_weight_a = 10
di_weight_b = 3
di_weight_c = 1

[convergence_plan]
# [DEPRECATED] 此部分将被新的多维度计划取代，暂时保留以兼容旧代码
# 在所有模块迁移完成后，此部分可以被安全移除
plan_name = 二阶段目标 (Beta Milestone)
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 95
end_count = 50

# --- 历史收敛计划 ---
# [DEPRECATED] 此部分也将被弃用
history_plan_1_name = 一阶段目标 (Alpha Milestone)
history_plan_1_start_date = 2024-03-01
history_plan_1_end_date = 2024-03-20
history_plan_1_start_count = 150
history_plan_1_end_count = 80

# --- 多维度燃尽图计划配置 ---
# 你可以定义多个燃尽图计划，每个计划有自己的目标和跟踪的指标。
# 格式为 [plan_any_name]
# - enabled: 是否启用此计划
# - plan_name: 显示在图表上的计划名
# - metric_name: 对应 history.csv 中的列名，用于跟踪实际值
# - start_date/end_date: 计划周期
# - start_count/end_count: 计划的起始和结束值

[plan_A]
enabled = true
plan_name = A类问题收敛计划
metric_name = A
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 10
end_count = 0

[plan_B]
enabled = true
plan_name = B类问题收敛计划
metric_name = B
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 30
end_count = 10

[plan_C]
enabled = false
plan_name = C类问题收敛计划
metric_name = C
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 60
end_count = 30

[plan_DI]
enabled = true
plan_name = DI值收敛计划
metric_name = DI
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 500
end_count = 150 