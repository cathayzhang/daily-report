[column_mapping]
# 定义源数据文件中的列名与程序内部标准名称的映射关系
# 格式为：内部标准名 = 源文件列名
key = issue_key
summary = summary
status = status
priority = priority
module = module
created_date = created
assignee = assignee

[settings]
# 定义历史数据文件的路径
history_path = data/history.csv
# JIRA 问题基础链接
jira_base_url = https://your-jira-instance.com/browse/
# 定义图表输出目录
charts_dir = output/charts/

[git]
# 本地 Git 仓库的路径
repo_path = .
# 默认查询的分支
branch = main

[report]
# Jinja2 报告模板的路径
template_path = templates/report_template.html
# 生成报告的输出目录
output_dir = output/reports/
# 项目名称，用于报告标题
project_name = 总控平台

[analysis]
# 定义分析时使用的参数
# 问题超期阈值（天）
overdue_threshold_days = 14
# 需要特别关注的标签，用逗号分隔
target_tags = on-fire,critical-bug

[kpi_settings]
# 定义高级KPI计算所需参数
# 计算7日趋势时，要关注的A类问题（优先级）的名称
# 这个值需要和你的JIRA数据中的优先级名称完全对应
a_priority_name = Blocker
# 定义风险模块分析时，需要统计的问题优先级列表，用逗号分隔
risk_module_priorities = Blocker,Critical

[convergence_plan]
# 当前生效的收敛计划
plan_name = 二阶段目标 (Beta Milestone)
start_date = 2024-03-21
end_date = 2024-03-31
start_count = 95
end_count = 50

# --- 历史收敛计划 ---
# 可以按需记录多个历史计划，用于在燃尽图上进行展示对比
# 格式为 history_plan_[序号]_[属性]
history_plan_1_name = 一阶段目标 (Alpha Milestone)
history_plan_1_start_date = 2024-03-01
history_plan_1_end_date = 2024-03-20
history_plan_1_start_count = 150
history_plan_1_end_count = 80 