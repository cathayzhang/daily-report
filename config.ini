[column_mapping]
# 定义源数据文件中的列名与程序内部标准名称的映射关系
# 格式为：内部标准名 = 源文件列名
key = issue_key
summary = summary
status = status
priority = priority
module = module
created_date = created
assignee = assignee

[settings]
# 定义历史数据文件的路径
history_path = data/history.csv
# JIRA 问题基础链接
jira_base_url = https://your-jira-instance.com/browse/
# 定义图表输出目录
charts_dir = output/charts/

[git]
# 本地 Git 仓库的路径
repo_path = .
# 默认查询的分支
branch = main

[report]
# Jinja2 报告模板的路径
template_path = templates/report_template.html
# 生成报告的输出目录
output_dir = output/reports/
# 项目名称，用于报告标题
project_name = 总控平台

[analysis]
# 定义分析时使用的参数
# 问题超期阈值（天）
overdue_threshold_days = 14
# 需要特别关注的标签，用逗号分隔
target_tags = on-fire,critical-bug

[kpi_settings]
# 定义高级KPI计算所需参数
# 计算7日趋势时，要关注的A类问题（优先级）的名称
# 这个值需要和你的JIRA数据中的优先级名称完全对应
a_priority_name = Blocker
# 定义风险模块分析时，需要统计的问题优先级列表，用逗号分隔
risk_module_priorities = Blocker,Critical

# 定义A、B、C类问题对应的优先级
class_a_priorities = Blocker
class_b_priorities = Critical,High
class_c_priorities = Medium,Low

[di_weights]
# DI 计算公式中 A, B, C 等级的权重
a = 10
b = 3
c = 1

# --- 多维度燃尽图计划配置 ---
# 你可以定义多个燃尽图计划，每个计划有自己的目标和跟踪的指标。
# 格式为 [plan_any_name]
# - enabled: 是否启用此计划
# - plan_name: 显示在图表上的计划名
# - metric: 对应 history_kpis 表中的列名 (A级, B级, C级, di_value)
# - start_date/end_date: 计划周期
# - start_count/end_count: 计划的起始和结束值

[plan_A]
enabled = true
plan_name = A类问题收敛计划
metric = A级
start_date = 2025-06-15
end_date = 2025-06-25
start_count = 50
end_count = 5

[plan_B]
enabled = true
plan_name = B类问题收敛计划
metric = B级
start_date = 2025-06-15
end_date = 2025-06-25
start_count = 80
end_count = 20

[plan_DI]
enabled = true
plan_name = DI值收敛计划
metric = di_value
start_date = 2025-06-15
end_date = 2025-06-25
start_count = 680
end_count = 150

[HighRiskRules]
# 定义动态高风险问题的筛选规则
# 规则格式: rule_name = column_name, operator, value
# 支持的操作符: equals, not_equals, contains, in, not_in, greater_than, less_than
# 对于 in 和 not_in，value 使用逗号分隔，例如: value1,value2,value3
rule1 = priority, in, Blocker,Critical
rule2 = status, not_in, Closed,Resolved,Done
rule3 = age, greater_than, 30
# 下面是一个被注释掉的例子，用于演示筛选包含特定标签的问题
# rule4 = labels, contains, tech-debt 